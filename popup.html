<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptGuard</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="toggle-container">
        <div class="toggle active" id="mainToggle"></div>
        <div class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
            <span class="toggle-icon">🌙</span>
        </div>
    </div>

    <div class="header">
        <div class="logo">
            <span class="shield-icon">🛡️</span>
            PromptGuard
        </div>
    </div>

    <div class="status-indicator">
        <div class="status-dot active" id="statusDot"></div>
        <span class="status-text" id="statusText">Protected</span>
    </div>

    <div class="privacy-score">
        <div class="score-circle" id="scoreCircle">92</div>
        <div class="score-label">Privacy Score</div>
    </div>

    <div class="quick-actions">
        <button class="action-btn" id="scanBtn">
            <div class="btn-icon">🔍</div>
            <div class="btn-content">
                <div class="btn-title">Scan Current Page</div>
                <div class="btn-subtitle">Check for personal information</div>
            </div>
        </button>

        <button class="action-btn" id="optimizeBtn">
            <div class="btn-icon">✨</div>
            <div class="btn-content">
                <div class="btn-title">Optimize Prompt</div>
                <div class="btn-subtitle">Improve current prompt</div>
            </div>
        </button>

        <button class="action-btn" id="alertsBtn">
            <div class="btn-icon">⚠️</div>
            <div class="btn-content">
                <div class="btn-title">View Alerts</div>
                <div class="btn-subtitle">Recent privacy warnings</div>
            </div>
            <div class="alerts-count" id="alertsCount">3</div>
        </button>

        <button class="action-btn" id="settingsBtn">
            <div class="btn-icon">⚙️</div>
            <div class="btn-content">
                <div class="btn-title">Settings</div>
                <div class="btn-subtitle">Configure protection levels</div>
            </div>
        </button>
    </div>

    <div class="footer">
        <div class="footer-text">Last scan: 2 minutes ago</div>
    </div>

    <div class="loading" id="loadingScreen">
        <div class="spinner"></div>
        <div>Scanning for personal information...</div>
    </div>

    <div class="notification" id="notification"></div>

    <script src="popup.js"></script>
</body>
</html>
